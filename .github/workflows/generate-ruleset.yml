name: Generate Shadowrocket RULE-SET

on:
  schedule:
    - cron: '0 3 * * *'  # 毎日 UTC 03:00 に実行
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve current blocklist filename
        id: meta
        run: |
          NAME=$(curl -fsSL https://raw.githubusercontent.com/Bon-Appetit/porn-domains/main/meta.json \
            | jq -r '.blocklist.name')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved blocklist file: $NAME"

      - name: Download blocklist
        run: |
          curl -fsSL "https://raw.githubusercontent.com/Bon-Appetit/porn-domains/main/${{ steps.meta.outputs.name }}" \
            -o blocklist.raw

      - name: Generate blocked.txt
        run: |
          # 各行を DOMAIN-SUFFIX,<domain> に変換 (空行・コメント除外)
          awk 'NF>0 && $0!~/^#/ { print "DOMAIN-SUFFIX," $1 }' blocklist.raw \
            | sort -u > blocked.txt
          wc -l blocked.txt
          du -sh blocked.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # 旧成果物の掃除
          git rm -f blocked_*.txt safebrowsing.txt blocked_*.conf 2>/dev/null || true
          git add blocked.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update blocked.txt"
          git push
