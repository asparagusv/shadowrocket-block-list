name: Generate Shadowrocket RULE-SET

on:
  schedule:
    - cron: '0 3 * * *'  # 毎日 UTC 03:00 に実行
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download hosts files
        run: |
          BASE=https://raw.githubusercontent.com/columndeeply/hosts/main
          for f in hosts00 hosts01 hosts02 hosts03 hosts04 hosts05 safebrowsing; do
            curl -fsSL "$BASE/$f" -o "$f"
          done

      - name: Generate split blocked_*.txt from hosts00-05
        run: |
          # 既存ファイルをクリア
          rm -f blocked_*.txt safebrowsing.txt
          # 重複排除してから2,000,000行ずつ分割
          awk 'NF==2 && $1!~/^#/ { print "DOMAIN-SUFFIX," $2 }' \
            hosts00 hosts01 hosts02 hosts03 hosts04 hosts05 \
            | sort -u \
            | split -l 2000000 --numeric-suffixes=0 --suffix-length=2 - blocked_
          for f in blocked_[0-9][0-9]; do mv "$f" "${f}.txt"; done
          wc -l blocked_*.txt

      - name: Generate safebrowsing.txt
        run: |
          awk 'NF==2 && $1!~/^#/ { print "DOMAIN-SUFFIX," $2 }' safebrowsing \
            | sort -u > safebrowsing.txt
          wc -l safebrowsing.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocked_*.txt safebrowsing.txt
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update rule-set txt files"
          git push
