name: Generate Shadowrocket RULE-SET

on:
  schedule:
    - cron: '0 3 * * *'  # 毎日 UTC 03:00 に実行
  workflow_dispatch:

env:
  BLOCKED_URL: https://raw.githubusercontent.com/asparagusv/shadowrocket-block-list/main/blocked.txt

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Resolve current blocklist filename
        id: meta
        run: |
          NAME=$(curl -fsSL https://raw.githubusercontent.com/Bon-Appetit/porn-domains/main/meta.json \
            | jq -r '.blocklist.name')
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "Resolved blocklist file: $NAME"

      - name: Download blocklist
        run: |
          curl -fsSL "https://raw.githubusercontent.com/Bon-Appetit/porn-domains/main/${{ steps.meta.outputs.name }}" \
            -o blocklist.raw

      - name: Generate blocked.txt
        run: |
          awk 'NF>0 && $0!~/^#/ { print "DOMAIN-SUFFIX," $1 }' blocklist.raw \
            | sort -u > blocked.txt
          wc -l blocked.txt

      - name: Generate shadowrocket.conf
        run: |
          {
            echo "# Auto-generated by GitHub Actions"
            echo "# Source blocklist: Bon-Appetit/porn-domains"
            echo "# Safe search hosts: from columndeeply/hosts (snapshot)"
            echo
            echo "[Rule]"
            echo "RULE-SET,${BLOCKED_URL},REJECT"
            echo "FINAL,DIRECT"
            echo
            echo "[Host]"
            cat safesearch_hosts.txt
          } > shadowrocket.conf
          wc -l shadowrocket.conf

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add blocked.txt shadowrocket.conf
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Update blocked.txt and shadowrocket.conf"
          git push
